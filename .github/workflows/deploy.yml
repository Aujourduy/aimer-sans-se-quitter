name: Deploy to GitHub Pages

on:
  # Publie à chaque push sur la branche principale.
  push:
    branches: [main]
  # Permet aussi un lancement manuel depuis l'onglet Actions.
  workflow_dispatch:

# Droits nécessaires au déploiement GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on ne coupe pas une publication en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # `npm install` ne dépend pas d'un package-lock.json (contrairement à
        # `npm ci`), ce qui rend le déploiement robuste.
        run: npm install

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
